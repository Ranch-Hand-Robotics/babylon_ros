name: Package

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      checks: write

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        registry-url: 'https://registry.npmjs.org'
    - run: npm ci
    - name: Build openscad-wasm from source
      run: npm run build-openscad-from-source
    - run: npm run build --if-present
   
    - name: Archive dist folder
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        if-no-files-found: error
        retention-days: 14