<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Host Demo - Cyberdeck Theme</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Cyberpunk Color Palette */
            --cyan: #00ffff;
            --cyan-dim: #00bcd4;
            --magenta: #ff0080;
            --green: #00ff41;
            --orange: #ff6600;
            --yellow: #ffe100;
            --red: #ff0055;
            
            /* Backgrounds */
            --bg-primary: #0a0a12;
            --bg-secondary: #0d1117;
            --bg-panel: #111827;
            --bg-card: #0f1923;
            
            /* Text Colors */
            --text-primary: #e0e0e0;
            --text-secondary: #8899aa;
            --text-muted: #445566;
            
            /* Border & Accents */
            --border: #1a2a3a;
            --border-cyan: rgba(0,255,255,0.3);
            
            /* Glows */
            --glow-cyan: 0 0 8px #00ffff, 0 0 16px rgba(0,255,255,0.5);
            --glow-magenta: 0 0 8px #ff0080, 0 0 16px rgba(255,0,128,0.5);
            --glow-green: 0 0 8px #00ff41, 0 0 16px rgba(0,255,65,0.5);
            --glow-orange: 0 0 8px #ff6600, 0 0 16px rgba(255,102,0,0.5);
            
            /* Fonts */
            --font-display: 'Orbitron', 'Courier New', monospace;
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
            --transition: 0.2s ease;
        }

        body {
            font-family: var(--font-mono);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Scanline overlay effect */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.15),
                rgba(0,0,0,0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            min-height: 100vh;
            padding: 1.5rem;
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }
        }

        /* Viewer Section */
        .viewer-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background-color: var(--bg-panel);
            border: 2px solid var(--cyan);
            border-radius: 0;
            padding: 1.5rem;
            box-shadow: var(--glow-cyan);
            min-height: 0;
            position: relative;
        }

        .viewer-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            animation: scan 2s ease-in-out infinite;
        }

        @keyframes scan {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .viewer-section h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--cyan);
            text-shadow: var(--glow-cyan);
            font-family: var(--font-display);
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        #renderCanvas {
            flex: 1;
            border: 1px solid var(--border-cyan);
            display: block;
            box-shadow: inset 0 0 10px rgba(0,255,255,0.1);
        }

        /* Host Controls Section */
        .host-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .panel {
            background-color: var(--bg-panel);
            border: 1px solid var(--magenta);
            padding: 1.5rem;
            box-shadow: var(--glow-magenta);
            position: relative;
        }

        .panel h3 {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--magenta);
            text-shadow: var(--glow-magenta);
            font-family: var(--font-display);
            margin-bottom: 1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .panel h3::before {
            content: '◆ ';
            margin-right: 0.5rem;
            color: var(--cyan);
        }

        /* Configuration Controls */
        .config-group {
            margin-bottom: 1rem;
        }

        .config-group:last-child {
            margin-bottom: 0;
        }

        .config-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--green);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-family: var(--font-mono);
        }

        .config-input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--cyan);
            background-color: var(--bg-secondary);
            color: var(--cyan);
            font-size: 0.875rem;
            font-family: var(--font-mono);
            transition: var(--transition);
        }

        .config-input:focus {
            outline: none;
            border-color: var(--magenta);
            box-shadow: var(--glow-magenta), inset 0 0 5px rgba(255,0,128,0.1);
            color: var(--magenta);
        }

        .config-input::placeholder {
            color: var(--text-muted);
        }

        select.config-input {
            cursor: pointer;
        }

        select.config-input option {
            background-color: var(--bg-secondary);
            color: var(--cyan);
        }

        /* Button Styles */
        .btn-primary {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--green);
            background-color: transparent;
            color: var(--green);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-mono);
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-primary:hover {
            background-color: rgba(0,255,65,0.1);
            box-shadow: var(--glow-green);
            color: var(--cyan);
            border-color: var(--cyan);
        }

        .btn-primary:active {
            box-shadow: inset 0 0 5px rgba(0,255,65,0.3);
        }

        /* Status Indicator */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem;
            background-color: rgba(0,255,65,0.05);
            border: 1px solid var(--green);
            border-radius: 0;
        }

        #statusDot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--text-muted);
            transition: var(--transition);
            box-shadow: none;
        }

        #statusDot.ready {
            background-color: var(--green);
            box-shadow: var(--glow-green);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #statusText {
            font-size: 0.875rem;
            color: var(--green);
            font-family: var(--font-mono);
            letter-spacing: 0.05em;
        }

        /* Customizer Panel */
        .customizer-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .customizer-empty {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .param-row {
            display: grid;
            grid-template-columns: 1fr 1.4fr;
            align-items: center;
            gap: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .param-row:last-child { border-bottom: none; }

        .param-label {
            font-size: 0.7rem;
            color: var(--orange);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            word-break: break-all;
        }

        .param-label small {
            display: block;
            color: var(--text-muted);
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
            font-size: 0.65rem;
            margin-top: 0.15rem;
        }

        .param-control {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .param-control input[type=range] {
            flex: 1;
            accent-color: var(--cyan);
            cursor: pointer;
        }

        .param-control .range-value {
            font-size: 0.7rem;
            color: var(--yellow);
            font-family: var(--font-mono);
            min-width: 2.5rem;
            text-align: right;
        }

        .param-control input[type=number],
        .param-control input[type=text],
        .param-control select {
            width: 100%;
            padding: 0.25rem 0.4rem;
            border: 1px solid var(--cyan);
            background: var(--bg-secondary);
            color: var(--cyan);
            font-size: 0.75rem;
            font-family: var(--font-mono);
        }

        .param-control select option { background: var(--bg-secondary); }

        .param-control input[type=checkbox] {
            width: 1rem; height: 1rem;
            accent-color: var(--cyan);
            cursor: pointer;
        }

        .render-btn {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--cyan);
            background: rgba(0,255,255,0.05);
            color: var(--cyan);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: var(--transition);
            margin-top: 0.5rem;
        }
        .render-btn:hover {
            background: rgba(0,255,255,0.15);
            box-shadow: var(--glow-cyan);
        }
        .render-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Config Display */
        .config-display {
            background-color: var(--bg-secondary);
            border: 1px solid var(--cyan);
            padding: 1rem;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            color: var(--cyan);
            max-height: 250px;
            overflow-y: auto;
            line-height: 1.4;
            box-shadow: inset 0 0 5px rgba(0,255,255,0.05);
        }

        /* Scrollbar Styling */
        .config-display::-webkit-scrollbar,
        .model-config-container::-webkit-scrollbar,
        .host-section::-webkit-scrollbar {
            width: 6px;
        }

        .config-display::-webkit-scrollbar-track,
        .model-config-container::-webkit-scrollbar-track,
        .host-section::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        .config-display::-webkit-scrollbar-thumb,
        .model-config-container::-webkit-scrollbar-thumb,
        .host-section::-webkit-scrollbar-thumb {
            background: var(--cyan);
            box-shadow: var(--glow-cyan);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
                gap: 1rem;
            }

            .viewer-section,
            .panel {
                padding: 1rem;
            }

            .config-display {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Model Viewer Section -->
        <div class="viewer-section">
            <h2>⧗ VIEWER_CORE ⧗</h2>
            <canvas id="renderCanvas"></canvas>
        </div>

        <!-- Host Controls Section -->
        <div class="host-section">
            <!-- Status Panel -->
            <div class="panel">
                <h3>System Status</h3>
                <div class="status-indicator">
                    <div id="statusDot"></div>
                    <span id="statusText">Initializing...</span>
                </div>
            </div>

            <!-- Theme Configuration Panel -->
            <div class="panel">
                <h3>Visual Config</h3>
                <div class="config-group">
                    <label class="config-label">Theme</label>
                    <select id="themeSelect" class="config-input">
                        <option value="cyberdeck">Cyberdeck (Default)</option>
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                    </select>
                </div>

                <div class="config-group">
                    <label class="config-label">Primary Accent</label>
                    <input type="color" id="primaryColor" class="config-input" value="#00ffff">
                    <input type="text" id="primaryColorText" class="config-input" value="#00ffff" placeholder="#000000" style="font-size: 0.75rem; margin-top: 0.25rem;">
                </div>

                <div class="config-group">
                    <label class="config-label">Secondary Accent</label>
                    <input type="color" id="secondaryColor" class="config-input" value="#00ff41">
                    <input type="text" id="secondaryColorText" class="config-input" value="#00ff41" placeholder="#000000" style="font-size: 0.75rem; margin-top: 0.25rem;">
                </div>

                <div class="config-group">
                    <label class="config-label">Alert Color</label>
                    <input type="color" id="accentColor" class="config-input" value="#ff0080">
                    <input type="text" id="accentColorText" class="config-input" value="#ff0080" placeholder="#000000" style="font-size: 0.75rem; margin-top: 0.25rem;">
                </div>
            </div>

            <!-- Model Control Panel -->
            <div class="panel">
                <h3>Model Loader</h3>
                <div class="config-group">
                    <label class="config-label">Model URL</label>
                    <input type="text" id="modelUrl" class="config-input" placeholder="https://example.com/model.scad">
                </div>
                <button class="btn-primary" id="loadModelBtn">Load from URL</button>
                
                <div class="config-group" style="margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem;">
                    <label class="config-label">Upload File</label>
                    <input type="file" id="fileInput" accept=".scad,.json,.urdf,.xacro" style="display: none;">
                    <button class="btn-primary" id="uploadFileBtn">Browse Files</button>
                    <div id="uploadStatus" style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;"></div>
                </div>
            </div>

            <!-- Customizer Panel -->
            <div class="panel" id="customizerPanel">
                <h3>Customizer</h3>
                <div id="customizerControls" class="customizer-container">
                    <span class="customizer-empty">Load a model to see parameters.</span>
                </div>
            </div>

            <!-- Action Log Panel -->
            <div class="panel">
                <h3>Event Log</h3>
                <div class="config-display" id="actionPayload" style="color: var(--text-secondary);">
                    Awaiting actions...
                </div>
            </div>
        </div>
    </div>

    <script>
        // Point the babylon_ros OpenSCAD worker to the correct path (web/workers/)
        window.__BABYLON_ROS_WORKER_URL = './workers/openscadWorker.js';
    </script>
    <script src="./ros.js"></script>
    <script>
        const themeConfig = {
            cyberdeck: {
                '--cyan': '#00ffff',
                '--magenta': '#ff0080',
                '--green': '#00ff41',
                '--orange': '#ff6600',
                '--yellow': '#ffe100',
            },
            light: {
                '--cyan': '#2563eb',
                '--magenta': '#db2777',
                '--green': '#16a34a',
                '--orange': '#ea580c',
                '--yellow': '#ca8a04',
            },
            dark: {
                '--cyan': '#06b6d4',
                '--magenta': '#ec4899',
                '--green': '#22c55e',
                '--orange': '#f97316',
                '--yellow': '#eab308',
            }
        };

        let viewer = null;
        let currentModelConfig = null;
        let customizerVariables = [];
        let pendingConfig = {};

        function applyTheme(themeName) {
            const root = document.documentElement;
            const colors = themeConfig[themeName] || themeConfig.cyberdeck;
            Object.entries(colors).forEach(([key, value]) => {
                root.style.setProperty(key, value);
            });
            console.log(`[THEME] Applied: ${themeName}`);
        }

        function updateStatus(state) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            if (state === 'ready') {
                dot.classList.add('ready');
                text.textContent = '✓ Ready';
            } else if (state === 'loading') {
                dot.classList.remove('ready');
                text.textContent = '◇ Loading...';
            } else {
                dot.classList.remove('ready');
                text.textContent = '✕ Error';
            }
        }

        function buildCustomizerControls(variables, configuration) {
            const container = document.getElementById('customizerControls');
            if (!variables || variables.length === 0) {
                container.innerHTML = '<span class="customizer-empty">No customizable parameters.</span>';
                return;
            }

            pendingConfig = { ...configuration };

            const rows = variables
                .filter(v => !v.hidden)
                .map(v => {
                    const val = configuration[v.name] ?? v.defaultValue;
                    const id = `param_${v.name}`;
                    let controlHtml = '';

                    if (v.widget === 'slider' && v.range) {
                        const min = v.range.min ?? 0;
                        const max = v.range.max ?? 100;
                        const step = v.range.step ?? 1;
                        controlHtml = `
                            <div class="param-control">
                                <input type="range" id="${id}" min="${min}" max="${max}" step="${step}" value="${val}" data-param="${v.name}" data-type="number">
                                <span class="range-value" id="${id}_val">${val}</span>
                            </div>`;
                    } else if (v.widget === 'dropdown' && v.options?.length) {
                        const opts = v.options.map(o =>
                            `<option value="${escapeHtml(String(o.value))}" ${o.value == val ? 'selected' : ''}>${escapeHtml(String(o.label ?? o.value))}</option>`
                        ).join('');
                        controlHtml = `<div class="param-control"><select id="${id}" data-param="${v.name}" data-type="${v.valueType}">${opts}</select></div>`;
                    } else if (v.widget === 'checkbox' || v.valueType === 'boolean') {
                        controlHtml = `<div class="param-control"><input type="checkbox" id="${id}" data-param="${v.name}" data-type="boolean" ${val ? 'checked' : ''}></div>`;
                    } else if (v.valueType === 'number') {
                        controlHtml = `<div class="param-control"><input type="number" id="${id}" value="${val}" data-param="${v.name}" data-type="number" step="any"></div>`;
                    } else {
                        controlHtml = `<div class="param-control"><input type="text" id="${id}" value="${escapeHtml(String(val))}" data-param="${v.name}" data-type="string"></div>`;
                    }

                    const desc = v.description ? `<small>${escapeHtml(v.description)}</small>` : '';
                    return `
                        <div class="param-row">
                            <label class="param-label" for="${id}">${escapeHtml(v.name)}${desc}</label>
                            ${controlHtml}
                        </div>`;
                }).join('');

            container.innerHTML = rows + `<button class="render-btn" id="renderBtn">▶ Render</button>`;

            // Wire up input events to track pending config
            container.querySelectorAll('[data-param]').forEach(el => {
                const name = el.dataset.param;
                const type = el.dataset.type;
                const update = () => {
                    let value;
                    if (el.type === 'checkbox') value = el.checked;
                    else if (type === 'number') value = parseFloat(el.value);
                    else value = el.value;
                    pendingConfig[name] = value;
                    if (el.type === 'range') {
                        document.getElementById(`${el.id}_val`).textContent = value;
                    }
                };
                el.addEventListener('input', update);
                el.addEventListener('change', update);
            });

            document.getElementById('renderBtn').addEventListener('click', async () => {
                const btn = document.getElementById('renderBtn');
                btn.disabled = true;
                btn.textContent = '◇ Rendering...';
                try {
                    await viewer.setConfiguration(pendingConfig);
                    viewer.resetCamera();
                    recordAction('config-applied', { config: pendingConfig });
                } catch (e) {
                    console.error('[RENDER] Error:', e);
                    recordAction('render-failed', { error: e.message });
                } finally {
                    btn.disabled = false;
                    btn.textContent = '▶ Render';
                }
            });
        }

        function recordAction(action, data) {
            const timestamp = new Date().toLocaleTimeString();
            const payload = {
                [timestamp]: '▶',
                action: action,
                ...(currentModelConfig ? { model: currentModelConfig.modelName } : {}),
                ...data
            };
            const display = document.getElementById('actionPayload');
            display.textContent = JSON.stringify(payload, null, 2);
            console.log(`[ACTION] ${action}:`, payload);
            return payload;
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Event Listeners
        document.getElementById('themeSelect').addEventListener('change', (e) => {
            applyTheme(e.target.value);
            recordAction('theme-changed', { theme: e.target.value });
        });

        document.getElementById('primaryColor').addEventListener('change', (e) => {
            document.documentElement.style.setProperty('--cyan', e.target.value);
            document.getElementById('primaryColorText').value = e.target.value;
            recordAction('accent-changed', { accent: 'primary', value: e.target.value });
        });

        document.getElementById('secondaryColor').addEventListener('change', (e) => {
            document.documentElement.style.setProperty('--green', e.target.value);
            document.getElementById('secondaryColorText').value = e.target.value;
            recordAction('accent-changed', { accent: 'secondary', value: e.target.value });
        });

        document.getElementById('accentColor').addEventListener('change', (e) => {
            document.documentElement.style.setProperty('--magenta', e.target.value);
            document.getElementById('accentColorText').value = e.target.value;
            recordAction('accent-changed', { accent: 'alert', value: e.target.value });
        });

        document.getElementById('loadModelBtn').addEventListener('click', async () => {
            const url = document.getElementById('modelUrl').value;
            if (!url) {
                alert('ERR: Missing model URL');
                recordAction('model-load-failed', { reason: 'no-url' });
                return;
            }
            if (viewer) {
                try {
                    await viewer.loadModelFromUrl(url);
                    recordAction('model-load-requested', { url: url });
                } catch (e) {
                    console.error('[LOAD] Error:', e);
                    recordAction('model-load-failed', { error: e.message });
                }
            }
        });

        document.getElementById('uploadFileBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files?.[0];
            if (!file) return;

            updateUploadStatus(`Loading ${file.name}...`);
            try {
                const content = await file.text();
                if (viewer) {
                    updateUploadStatus(`Converting ${file.name}...`);
                    await viewer.loadModelData(content, file.name);
                    updateUploadStatus(`✓ ${file.name}`);
                    recordAction('model-uploaded', { filename: file.name, size: file.size });
                }
            } catch (error) {
                const errorMsg = error instanceof Error ? error.message : 'Unknown error';
                updateUploadStatus(`✗ Error: ${errorMsg}`);
                recordAction('upload-failed', { filename: file.name, error: errorMsg });
                console.error('[UPLOAD] Error:', error);
            }
            
            // Reset file input
            e.target.value = '';
        });

        function updateUploadStatus(message) {
            const statusEl = document.getElementById('uploadStatus');
            statusEl.textContent = message;
        }

        // Initialize
        window.addEventListener('load', async () => {
            applyTheme('cyberdeck');
            updateStatus('loading');
            recordAction('page-initialized', { theme: 'cyberdeck' });

            try {
                const canvas = document.getElementById('renderCanvas');
                viewer = await babylon_ros.RenderOpenScadDirect({
                    canvas: canvas,
                    theme: themeConfig.cyberdeck,
                    autoConvertOnLoad: false,
                    onModelLoaded: (detail) => {
                        console.log('[HOST] Model loaded:', detail);
                        currentModelConfig = detail;
                        customizerVariables = detail.variables || [];
                        buildCustomizerControls(customizerVariables, detail.configuration);
                        const { variables: _v, ...logDetail } = detail;
                        recordAction('model-loaded', logDetail);
                    },
                    onConfigurationChange: (detail) => {
                        console.log('[HOST] Config changed:', detail);
                        currentModelConfig = detail;
                        // Update range value labels if controls already exist
                        if (detail.configuration) {
                            Object.entries(detail.configuration).forEach(([name, val]) => {
                                const el = document.getElementById(`param_${name}`);
                                if (el?.type === 'range') {
                                    el.value = String(val);
                                    const lbl = document.getElementById(`param_${name}_val`);
                                    if (lbl) lbl.textContent = String(val);
                                }
                            });
                        }
                        const { variables: _v, ...logDetail } = detail;
                        recordAction('config-changed', logDetail);
                    }
                });
                updateStatus('ready');
                recordAction('viewer-initialized', { success: true });

                // Prevent page scroll when mouse is over viewer
                canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                }, { passive: false });

                // Monitor canvas container for size changes and update render buffer
                const containerObserver = new ResizeObserver(() => {
                    if (viewer) {
                        viewer.resizeRenderer();
                    }
                });
                const container = canvas.parentElement;
                if (container) {
                    containerObserver.observe(container);
                }
            } catch (e) {
                console.error('[INIT] Failed:', e);
                updateStatus('error');
                recordAction('viewer-init-failed', { error: e.message });
            }
        });
    </script>
</body>
</html>
